services:

  # ── SQL Server ─────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clinic-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=ClinicApp!Password123
    volumes:
      - mssql-data:/var/opt/mssql

  # ── FastAPI AI Service ─────────────────────────────────────────────────────
  clinicai:
    build:
      context: ./ClinicAI
      dockerfile: Dockerfile
    container_name: clinic-ai
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - MODELS_DIR=/models
    volumes:
      # Mount the shared models directory (train once from ClinicApp-Ai, serve from here)
      - ./models:/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  mssql-data:
