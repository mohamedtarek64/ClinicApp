services:
  #  Database Service (SQL Server 2022)
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Clinic_Secret_Pass_2024!
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Clinic_Secret_Pass_2024!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  # AI Service (FastAPI + AI Models)
  clinicai:
    build:
      context: ./ClinicAI
      dockerfile: Dockerfile
    container_name: clinicai_service
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - APP_NAME=ClinicAI-Production
      - API_KEY=clinic_secret_key_2024
    volumes:
      - ./ClinicAI/models:/app/models # Mount models directory
    restart: always

  # Backend Service (.NET 8.0)
  clinic-backend:
    build:
      context: "./Clinic Project"
      dockerfile: Dockerfile
    container_name: clinic_backend_service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ClinicApp;User Id=sa;Password=Clinic_Secret_Pass_2024!;TrustServerCertificate=True;
      - AIService__BaseUrl=http://clinicai:8000
      - AIService__ApiKey=clinic_secret_key_2024
    depends_on:
      sqlserver:
        condition: service_healthy # Wait for database to be fully ready
      clinicai:
        condition: service_started
    restart: always
